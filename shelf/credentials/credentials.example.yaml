# credentials.example.yaml — copy to a project-local credentials.yaml (chmod 600,
# git-ignored). Each top-level key is a profile handle the agent refers to by name.
# It never sees the values.
#
# Override any field at runtime (CI / scripts) without touching the file:
#   QATAKI_CRED__SHOP__PASSWORD=...    QATAKI_CRED__SHOP__USERNAME=...

myapp:
  type: basic                 # HTTP Basic Auth
  username: max
  password: s3cret

shop:
  type: form                  # normal form login
  url: https://shop.example/login
  username: max@firma.de
  password: hunter2
  user_field: "label=E-Mail"   # label=… | placeholder=… | CSS | role=… | text=…
  pass_field: "label=Passwort"
  submit: "role=button[name=Login]"
